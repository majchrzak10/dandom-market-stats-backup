name: Mirror to backup repo

# Pushuje cały main na dandom-market-stats-backup po każdym commicie + raz w tygodniu
# jako safety net. Backup repo jest read-only przez GitHub UI, write tylko przez ten workflow.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 0"  # niedziela 4:00 UTC
  workflow_dispatch:

# Pozwalamy tylko jednemu mirror'owi naraz — żeby push'e się nie zderzały.
concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # pełna historia, nie tylko HEAD

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.BACKUP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Push to backup
        run: |
          git remote add backup git@github.com:majchrzak10/dandom-market-stats-backup.git
          # Backup ma być EXACT mirrorem main. Force-with-lease zabezpiecza
          # przed race condition (równoległe push'e na main = równoległe mirrory)
          # i orphan-commits zostałych po rebase'ach. Skoro backup jest write-only-
          # from-workflow, nikt go ręcznie nie ruszy → force jest bezpieczne.
          git fetch backup main || true
          git push backup main --force-with-lease
          git push backup --tags --force || true
