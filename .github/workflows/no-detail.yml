name: NO detail enrichment (weekly)

# Co tydzien pobiera detail page kazdej oferty NO i rozszyfrowuje agencyName
# przez profil agenta. Wynik cache'owany w data/no-cache/ (TTL 30/90 dni)
# wiec kolejne runy sciagaja tylko nowe oferty.

on:
  schedule:
    - cron: "0 4 * * 0"  # niedziela 4:00 UTC
  workflow_dispatch:

concurrency:
  group: no-detail
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 75  # max ~70 min na full scrape (~600 ofert × 5s + buffer)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - name: Fetch NO detail + rebuild combined
        run: node scripts/fetch-no-detail.mjs

      - name: Re-analyze + rebuild dashboard
        run: node scripts/analyze.mjs && node scripts/build-dashboard.mjs

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dist/
          if git diff --cached --quiet; then
            echo "Brak zmian po enrichment."
          else
            git commit -m "chore(no-detail): enrichment + rebuild combined $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              if git push origin HEAD; then exit 0; fi
              echo "Push odrzucony (proba $i/3), rebase..."
              git pull --rebase -X ours origin main
            done
            echo "Push nieudany po 3 probach"
            exit 1
          fi
