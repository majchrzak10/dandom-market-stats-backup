name: Daily snapshot & dashboard

on:
  schedule:
    - cron: "30 6 * * *"  # 6:30 UTC = 8:30 PL latem
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Strona-Dan-Dom (asari-export)
        uses: actions/checkout@v4
        with:
          repository: majchrzak10/Strona-Dan-Dom
          path: strona-dan-dom
          sparse-checkout: |
            asari-export

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Snapshot + analyze + build dashboard
        env:
          ASARI_DATA_DIR: ${{ github.workspace }}/strona-dan-dom/asari-export
        run: npm run all

      - name: Commit snapshot + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dist/
          if git diff --cached --quiet; then
            echo "Brak zmian."
          else
            git commit -m "chore(stats): snapshot $(date -u +%Y-%m-%d) [skip ci]"
            # Retry push 3x z rebase — żeby race condition z innym workflow nie zabijał commitu.
            for i in 1 2 3; do
              if git push origin HEAD; then exit 0; fi
              echo "Push odrzucony (próba $i/3), rebase..."
              git pull --rebase -X ours origin main
            done
            echo "Push nieudany po 3 próbach"
            exit 1
          fi
